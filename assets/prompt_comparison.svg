<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650" width="1400" height="650" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="650" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2328">Why schema-echo happens: the prompt format is the root cause</text>

  <!-- =========================== PANEL 1: Pydantic =========================== -->
  <!-- Panel 1: x = 24, width = 448 (32%), trimmed height -->
  <rect x="24" y="68" width="448" height="528" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="4"/>

  <!-- Headers -->
  <text x="48" y="100" font-size="14" font-weight="bold" fill="#1F2328">Pydantic: model_json_schema()</text>
  <text x="48" y="120" font-size="11" fill="#57606A">62 lines, 1100 characters</text>

  <!-- Code block background -->
  <rect x="48" y="138" width="400" height="434" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1" rx="3"/>

  <!-- Pydantic code content - using tspan for highlighting -->
  <g font-family="Menlo, Consolas, Courier, monospace" font-size="11" fill="#1F2328">
    <text x="60" y="160">{</text>
    <text x="60" y="178">  <tspan fill="#D1242F">"$defs"</tspan>: {</text>
    <text x="60" y="196">    "MatchEntry": {</text>
    <text x="60" y="214">      <tspan fill="#D1242F">"properties"</tspan>: {</text>
    <text x="60" y="232">        "bullet_id": {...},</text>
    <text x="60" y="250">        "jd_requirement": {...},</text>
    <text x="60" y="268">        "match_score": {...},</text>
    <text x="60" y="286">        "justification": {...}</text>
    <text x="60" y="304">      },</text>
    <text x="60" y="322">      "required": [...],</text>
    <text x="60" y="340">      "title": "MatchEntry"</text>
    <text x="60" y="358">    }</text>
    <text x="60" y="376">  },</text>
    <text x="60" y="394">  <tspan fill="#D1242F">"properties"</tspan>: {</text>
    <text x="60" y="412">    "matches": {</text>
    <text x="60" y="430">      "items": {"$ref": "#/$defs/MatchEntry"}</text>
    <text x="60" y="448">    },</text>
    <text x="60" y="466">    "coverage_score": {...},</text>
    <text x="60" y="484">    "missing_requirements": {...}</text>
    <text x="60" y="502">  },</text>
    <text x="60" y="520">  "required": [...],</text>
    <text x="60" y="538">  "title": "MatchResult"</text>
    <text x="60" y="556">}</text>
  </g>

  <!-- =========================== PANEL 2: Failure mechanism =========================== -->
  <!-- Panel 2: x = 504, width = 364 (26%), trimmed height -->
  <rect x="504" y="68" width="364" height="528" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="4"/>

  <!-- Arrow 1: from left edge of panel into the model box (longer, more room for label) -->
  <text x="600" y="188" text-anchor="middle" font-size="12" fill="#1F2328">Claude 3 Haiku reads</text>
  <line x1="528" y1="208" x2="672" y2="208" stroke="#57606A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Model/thought box (shifted right) -->
  <rect x="680" y="172" width="180" height="80" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1" rx="6"/>
  <text x="770" y="196" text-anchor="middle" font-size="12" fill="#1F2328">LLM mirrors</text>
  <text x="770" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F2328">$defs and properties</text>
  <text x="770" y="232" text-anchor="middle" font-size="12" fill="#1F2328">structure</text>

  <!-- Arrow 2: from model box down to outcome -->
  <line x1="686" y1="260" x2="686" y2="320" stroke="#57606A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="696" y="290" font-size="12" fill="#1F2328">Returns</text>

  <!-- Outcome box -->
  <rect x="528" y="332" width="316" height="170" fill="#FFF1F0" stroke="#D1242F" stroke-width="1.5" rx="4"/>
  <g font-family="Menlo, Consolas, Courier, monospace" font-size="11" fill="#1F2328">
    <text x="544" y="356">{</text>
    <text x="544" y="374">  <tspan fill="#D1242F">"$defs"</tspan>: {...},</text>
    <text x="544" y="392">  <tspan fill="#D1242F">"properties"</tspan>: {</text>
    <text x="544" y="410">    "matches": [...],</text>
    <text x="544" y="428">    "coverage_score": 0.95</text>
    <text x="544" y="446">  }</text>
    <text x="544" y="464">}</text>
  </g>

  <!-- Failure annotation -->
  <text x="686" y="534" text-anchor="middle" font-size="12" font-weight="bold" fill="#D1242F">Pydantic validation fails:</text>
  <text x="686" y="552" text-anchor="middle" font-size="12" fill="#D1242F">matches not at root</text>

  <!-- =========================== PANEL 3: BAML =========================== -->
  <!-- Panel 3: x = 900, width = 476 (32%), trimmed height -->
  <rect x="900" y="68" width="476" height="528" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="4"/>

  <!-- Headers -->
  <text x="924" y="100" font-size="14" font-weight="bold" fill="#1F2328">BAML: ctx.output_format</text>
  <text x="924" y="120" font-size="11" fill="#57606A">13 lines, 185 characters</text>

  <!-- Code block background -->
  <rect x="924" y="138" width="428" height="298" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1" rx="3"/>

  <!-- BAML code content -->
  <g font-family="Menlo, Consolas, Courier, monospace" font-size="11" fill="#1F2328">
    <text x="936" y="160">Answer in JSON using this schema:</text>
    <text x="936" y="178">{</text>
    <text x="936" y="196">  matches: [</text>
    <text x="936" y="214">    {</text>
    <text x="936" y="232">      bullet_id: int,</text>
    <text x="936" y="250">      jd_requirement: string,</text>
    <text x="936" y="268">      <tspan fill="#57606A">// 0.0 to 1.0</tspan></text>
    <text x="936" y="286">      match_score: float,</text>
    <text x="936" y="304">      justification: string,</text>
    <text x="936" y="322">    }</text>
    <text x="936" y="340">  ],</text>
    <text x="936" y="358">  <tspan fill="#57606A">// 0.0 to 1.0 - fraction of JD requirements covered</tspan></text>
    <text x="936" y="376">  coverage_score: float,</text>
    <text x="936" y="394">  missing_requirements: string[],</text>
    <text x="936" y="412">}</text>
  </g>

  <!-- BAML success annotation -->
  <text x="1138" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A7F37">No $defs or $ref tokens.</text>
  <text x="1138" y="498" text-anchor="middle" font-size="12" fill="#1A7F37">LLM has nothing to mirror.</text>

  <!-- Footer -->
  <text x="700" y="634" text-anchor="middle" font-size="11" fill="#57606A">Source: 1,800-call A/B benchmark. 116 of 116 Pydantic failures matched this pattern.</text>
</svg>
